<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Plan Results</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    padding: 40px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: #1e293b;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.7);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 32px;
    background: linear-gradient(90deg, #60a5fa, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.section {
    margin-bottom: 25px;
    padding: 20px;
    background: #020617;
    border-radius: 12px;
    box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
}

.section h2 {
    margin-bottom: 12px;
    color: #3b82f6;
    font-size: 20px;
}

/* WORKFLOW STEPS */
.workflow-step {
    margin-left: 20px;
    margin-bottom: 8px;
    padding-left: 10px;
    border-left: 3px solid #60a5fa;
}

/* STRESS COLORS */
.stress-low {
    color: #4ade80; /* green */
}
.stress-medium {
    color: #facc15; /* yellow */
}
.stress-high {
    color: #f87171; /* red */
}

/* OVERDOING */
.overdoing-true {
    color: #f87171;
    font-weight: bold;
}
.overdoing-false {
    color: #4ade80;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>Your Study Plan</h1>

    <!-- WORKFLOW -->
    <div class="section">
        <h2>Workflow</h2>
        {% for step in result['workflow'].split('\n') %}
            <div class="workflow-step">{{ step }}</div>
        {% endfor %}
    </div>

    <!-- STRESS -->
    <div class="section">
        <h2>Stress Level</h2>
        <div class="stress-{{ result['stress'] | lower }}">{{ result['stress'].capitalize() }}</div>
    </div>

    <!-- OVERDOING -->
    <div class="section">
        <h2>Too Much Work?</h2>
        {% if result['overdoing'] %}
            <div class="overdoing-true">Yes</div>
        {% else %}
            <div class="overdoing-false">No</div>
        {% endif %}
    </div>
</div>

</body>
</html>
